# Workers + 静态资源（frontend/dist），Express /api 使用 Node HTTP 桥接（handleAsNodeRequest）
# CLI：npm run deploy
#
# D1 迁移：
#   npm run d1:migrate:remote

name = "personal-blog"
main = "src/worker.mjs"
compatibility_date = "2025-11-01"

compatibility_flags = [
  "nodejs_compat",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
]

[[d1_databases]]
binding = "DB"
database_name = "personal-blog-db"
database_id = "1b880730-f920-414c-a54a-851da0020ac1"

# JWT_SECRET 必须用 Secret，勿写进仓库。首次或轮换后执行：
#   npx wrangler secret put JWT_SECRET

[vars]
JWT_EXPIRES_IN = "7d"

[assets]
directory = "frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]
