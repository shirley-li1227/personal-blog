# Cloudflare Pages：frontend/dist + Pages Functions；数据库 D1（SQLite）
# 将 REPLACE_WITH_D1_DATABASE_ID 换成：wrangler d1 create personal-blog-db 输出里的 database_id
#
# 远程执行迁移：
#   npx wrangler d1 execute personal-blog-db --remote --file=migrations/0001_init.sql
# 本地 wrangler 预览：
#   npx wrangler d1 execute personal-blog-db --local --file=migrations/0001_init.sql

name = "personal-blog"
pages_build_output_dir = "frontend/dist"
compatibility_date = "2025-11-01"

compatibility_flags = [
  "nodejs_compat",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
]

[[d1_databases]]
binding = "DB"
database_name = "personal-blog-db"
database_id = "1b880730-f920-414c-a54a-851da0020ac"
